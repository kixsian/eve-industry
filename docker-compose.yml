version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eve_calc
      POSTGRES_PASSWORD: eve_calc_dev
      POSTGRES_DB: eve_industry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eve_calc"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://eve_calc:eve_calc_dev@postgres:5432/eve_industry
      EVE_CLIENT_ID: ${EVE_CLIENT_ID:-}
      EVE_CLIENT_SECRET: ${EVE_CLIENT_SECRET:-}
      EVE_CALLBACK_URL: ${EVE_CALLBACK_URL:-http://localhost:3000/auth/callback}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
    working_dir: /app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    environment:
      VITE_API_BASE: http://localhost:8000/api

volumes:
  postgres_data:
